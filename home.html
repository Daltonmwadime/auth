    <h2>Welcome to Auth App</h2>

    <p>This is a simple authentication system built with HTML.</p>

    <ul>
      <li><a href="register.html">Register</a> - Create a new account</li>

    <hr />
    <footer action="submit_form" method="post">
      <h2><b>Contact Form</b></h2>
      <label for="emailaddress">Email</label><br />
      <input
        type="email"
        id="email"
        placeholder="Enter Your Email"
        required
      /><br /><br />
      <label for="message">Message</label><br />
      <textarea
        id="message"
        placeholder="Write to me"
        rows="4"
        required
      ></textarea
      ><br />
    </footer>
