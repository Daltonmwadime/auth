<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="refresh" content="20; url=register.html" />
    <title>Auth App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Redirect notice: shown while the auto-redirect countdown runs -->
    <nav>
      <a href="register.html">Register</a> | <a href="login.html">Login</a> |
      <a href="dashboard.html">Dashboard</a> | <a href="home.html">Home</a>
    </nav>
    <!-- Login form: submits credentials via POST to the login endpoint -->
    <form action="login" method="post">
      <!-- Username input — required -->
      <label for="username">Username:</label><br />
      <input
        type="text"
        id="username"
        name="username"
        placeholder="Enter your username"
        required="required"
      /><br /><br />

      <!-- Password input — required -->
      <label for="password">Password:</label><br />
      <input
        type="password"
        id="password"
        name="password"
        placeholder="Enter your password"
        required
      /><br /><br />

      <!-- Submit button -->
      <button type="submit">Login</button>
    </form>

    <!-- Page divider -->
    <hr />

    <!-- Copyright notice -->
    <p>© Copyright 2025 Dalton mwadime. All rights reserved.</p>
  </body>
</html>
